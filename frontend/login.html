<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TokoKita</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <h1><a href="index.html" style="text-decoration: none; color: inherit;">TokoKita</a></h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="cart.html">Keranjang (<span id="cart-count">0</span>)</a></li>
                </ul>
        </nav>
    </header>

    <main>
        <section class="auth-section">
            <div class="auth-container">
                <h2>Masuk ke Akun Anda</h2>
                
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="Masukkan email Anda">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="Masukkan password Anda">
                    </div>
                    
                    <button type="submit" class="btn-submit">Login</button>
                </form>

                <div id="auth-message" style="margin-top: 15px; text-align: center; color: red;"></div>

                <p class="auth-switch">
                    Belum punya akun? <a href="register.html">Daftar di sini</a>
                </p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 TokoKita. Dibuat untuk portofolio.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
